name: DevOps CI/CD Pipeline

on:
 push:
  branches:
   - main

jobs:

 build:
  runs-on: ubuntu-latest

  steps:
   - name: Checkout Code
     uses: actions/checkout@v4

   - name: Build Project
     run: echo "Build Successful"

   - name: Build Report
     run: echo "Build Completed Successfully"

 deploy:
  needs: build
  runs-on: ubuntu-latest

  steps:
   - name: Checkout Code
     uses: actions/checkout@v4

   - name: Deploy Report
     run: echo "Deploy Successful"
